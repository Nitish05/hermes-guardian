phone:
  ip: "192.168.1.50"
  ping_count: 1
  ping_timeout_seconds: 1.0
  ping_interval_home_seconds: 180.0
  ping_interval_guardian_seconds: 30.0
  missed_ping_threshold: 3
  return_ping_threshold: 2

presence:
  home_score_threshold: 2.0
  ping_enabled: false
  ping_weight: 0.5
  router_command: ""
  router_command_weight: 2.0
  router_command_timeout_seconds: 5.0
  ble_enabled: true
  ble_weight: 2.0
  ble_scan_seconds: 6.0
  ble_company_id: 76
  ble_uuid: "01122334-4556-6778-899a-abbccddeeff0"
  ble_major: 1
  ble_minor: 1
  ble_min_rssi:

camera:
  source: 0
  frame_width: 640
  frame_height: 480
  sample_fps: 1.0

detection:
  backend: "yolo"
  model: "yolo26n.pt"
  confidence: 0.45
  image_size: 320
  consecutive_unknown_threshold: 2
  alert_cooldown_seconds: 60.0
  hog_scale: 1.05
  hog_group_threshold: 2.0

face:
  enabled: false
  tolerance: 0.6
  detection_model: "hog"
  upsample: 0

notify:
  command: "/usr/local/bin/hermes-guardian-notify"
  timeout_seconds: 10.0

paths:
  state_file: "~/.local/state/hermes-guardian/state.json"
  event_log: "~/.local/state/hermes-guardian/events.jsonl"
  data_dir: "~/.local/share/hermes-guardian"
  snapshot_dir: "~/.local/state/hermes-guardian/snapshots"
